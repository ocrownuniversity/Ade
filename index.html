<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0a0a0a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="BENIM"/>
<link rel="manifest" id="pwa-manifest"/>
<title>BENIM - Luxury Fashion</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#c9a84c;--bg:#f5f4f0;--surface:#fff;--surface2:#f8f6f2;--text:#0a0a0a;--text2:#555;--text3:#999;--border:rgba(0,0,0,.09);--r:16px;--nav:68px;}
[data-theme=dark]{--bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--text:#f0ede8;--text2:#aaa;--text3:#555;--border:rgba(255,255,255,.08);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow-x:hidden;}
body{font-family:"Montserrat",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;border:none;background:none;font-family:inherit;}
input,select,textarea{font-family:inherit;outline:none;}
img{max-width:100%;display:block;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px;}
.pg{display:none;position:fixed;inset:0;overflow-y:auto;overflow-x:hidden;background:var(--bg);padding-bottom:var(--nav);-webkit-overflow-scrolling:touch;}
.pg.on{display:block;animation:pgIn .25s ease;}
@keyframes pgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
#pg-splash{background:#0a0a0a;display:flex!important;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;}
.sp-logo{font-family:"Cormorant Garamond",serif;font-size:64px;font-weight:300;color:#fff;letter-spacing:.3em;}
.sp-tag{font-size:10px;letter-spacing:.5em;color:var(--gold);text-transform:uppercase;}
.sp-bar{width:80px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);}
/* SIDEBAR */
.sidebar{position:fixed;top:0;left:-280px;width:280px;height:100%;background:var(--surface);z-index:1000;transition:left .3s ease;box-shadow:4px 0 24px rgba(0,0,0,.2);overflow-y:auto;}
.sidebar.open{left:0;}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;}
.sb-overlay.on{display:block;}
.sb-head{background:linear-gradient(135deg,#0a0a0a,#1a1200);padding:50px 20px 24px;text-align:center;}
.sb-logo{font-family:"Cormorant Garamond",serif;font-size:30px;color:#fff;letter-spacing:.3em;font-weight:300;margin-bottom:4px;}
.sb-tag{font-size:9px;letter-spacing:.3em;color:var(--gold);}
.sb-user{margin-top:12px;font-size:11px;color:rgba(255,255,255,.6);padding:6px 12px;background:rgba(255,255,255,.08);border-radius:20px;display:inline-block;}
.sb-menu{padding:8px 0;}
.sb-item{display:flex;align-items:center;gap:14px;padding:14px 20px;font-size:13px;font-weight:600;color:var(--text);width:100%;text-align:left;border-bottom:1px solid var(--border);transition:background .15s;}
.sb-item:active{background:var(--surface2);}
.sb-item span:first-child{font-size:18px;width:26px;text-align:center;}
.sb-item.danger{color:#e53935;}
.sb-item.gold{color:var(--gold);}
.sb-div{height:1px;background:var(--border);margin:6px 0;}
/* TOPBAR */
.tb{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);}
.tb-logo{font-family:"Cormorant Garamond",serif;font-size:24px;font-weight:300;letter-spacing:.25em;cursor:pointer;}
.tb-r,.tb-l{display:flex;align-items:center;gap:2px;}
.ib{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text);position:relative;cursor:pointer;}
.ib:active{background:var(--surface2);}
.ph{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);}
.ph-title{font-size:15px;font-weight:700;letter-spacing:.04em;}
.bb{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text);cursor:pointer;}
/* BANNER */
.bn-wrap{position:relative;overflow:hidden;height:62vw;max-height:400px;background:#111;}
.bn-track{display:flex;height:100%;transition:transform .5s cubic-bezier(.25,.46,.45,.94);}
.bn-slide{position:relative;flex-shrink:0;width:100%;height:100%;}
.bn-img{width:100%;height:100%;object-fit:cover;opacity:.7;}
.bn-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85),transparent 55%);}
.bn-cnt{position:absolute;bottom:44px;left:20px;right:70px;color:#fff;}
.bn-sub{font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.bn-ttl{font-family:"Playfair Display",serif;font-size:26px;font-weight:700;line-height:1.15;margin-bottom:14px;}
.bn-dots{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:5px;}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;transition:all .3s;}
.dot.on{width:18px;border-radius:3px;background:var(--gold);}
.bn-arr{position:absolute;top:50%;transform:translateY(-50%);width:34px;height:34px;background:rgba(255,255,255,.12);border-radius:50%;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;}
.bn-prev{left:10px;}.bn-next{right:10px;}
/* MARQUEE */
.mq{background:#0a0a0a;overflow:hidden;padding:9px 0;}
[data-theme=dark] .mq{background:#111;}
.mq-t{display:flex;width:max-content;animation:mq 22s linear infinite;}
.mq-t span{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);white-space:nowrap;padding:0 8px;}
@keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
/* SECTIONS */
.sec{padding:22px 0 6px;}
.sec-h{display:flex;align-items:center;justify-content:space-between;padding:0 16px;margin-bottom:12px;}
.sec-ttl{font-family:"Cormorant Garamond",serif;font-size:21px;font-weight:600;}
.sec-lnk{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:600;}
.gold-sec{background:var(--surface2);padding:22px 0 8px;}
.ps{display:flex;gap:10px;padding:0 16px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.ps::-webkit-scrollbar{display:none;}
.pg2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px;}
/* PRODUCT CARD */
.pc{background:var(--surface);border-radius:var(--r);overflow:hidden;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.06);scroll-snap-align:start;flex-shrink:0;width:175px;transition:transform .2s;}
.pg2 .pc{width:auto;}
.pc:active{transform:scale(.97);}
.pc.sm{width:148px;}
.pi-wrap{position:relative;padding-top:110%;overflow:hidden;}
.pc.sm .pi-wrap{padding-top:100%;}
.pi-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.pc:hover .pi-wrap img{transform:scale(1.05);}
.bdg{position:absolute;top:8px;left:8px;background:var(--gold);color:#000;font-size:8px;font-weight:800;padding:3px 7px;border-radius:4px;text-transform:uppercase;}
.flash-b{position:absolute;top:8px;left:8px;background:#e53935;color:#fff;font-size:8px;font-weight:800;padding:3px 7px;border-radius:4px;}
.disc-b{position:absolute;top:8px;right:34px;background:#e53935;color:#fff;font-size:8px;font-weight:800;padding:3px 6px;border-radius:4px;}
.wb{position:absolute;bottom:8px;right:8px;background:rgba(255,255,255,.92);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.15);border:none;cursor:pointer;}
.pi-info{padding:9px 11px 11px;}
.pi-cat{font-size:9px;color:var(--text3);margin-bottom:2px;}
.pi-nm{font-size:11px;font-weight:600;margin-bottom:3px;line-height:1.3;}
.pi-rt{font-size:9px;color:var(--gold);margin-bottom:5px;}
.pi-rt span{color:var(--text3);}
.pi-pr{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.pr-m{font-size:12px;font-weight:800;color:var(--gold);}
.pr-c{font-size:10px;color:var(--text3);text-decoration:line-through;}
/* CATS */
.cs{display:flex;gap:10px;padding:0 16px;overflow-x:auto;scrollbar-width:none;}
.cs::-webkit-scrollbar{display:none;}
.cc{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;cursor:pointer;}
.cc-ic{width:54px;height:54px;background:var(--surface);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);}
.cc-nm{font-size:8px;font-weight:700;text-align:center;color:var(--text2);max-width:64px;}
.cg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:16px;}
.crd{background:var(--surface);border-radius:var(--r);overflow:hidden;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.crd:active{transform:scale(.97);}
.crd-img{position:relative;padding-top:65%;overflow:hidden;background:#111;}
.crd-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.crd-ov{position:absolute;inset:0;background:rgba(0,0,0,.3);}
.crd-body{display:flex;align-items:center;gap:8px;padding:11px 12px;}
.crd-nm{font-size:12px;font-weight:600;}
.cat-ban{position:relative;height:130px;overflow:hidden;}
.cat-ban img{width:100%;height:100%;object-fit:cover;opacity:.5;}
.cat-ban-ttl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:"Playfair Display",serif;font-size:26px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.5);}
.fb{display:flex;gap:7px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);}
.fb::-webkit-scrollbar{display:none;}
.fbtn{padding:6px 13px;border-radius:20px;font-size:10px;font-weight:700;background:var(--surface2);color:var(--text2);flex-shrink:0;border:1px solid var(--border);cursor:pointer;}
.fbtn.on{background:var(--gold);color:#000;border-color:var(--gold);}
/* PROMO */
.pb{margin:8px 16px;border-radius:var(--r);background:linear-gradient(135deg,#0a0a0a,#1a1200);padding:26px 22px;cursor:pointer;position:relative;overflow:hidden;}
.pb::before{content:"";position:absolute;right:-20px;top:-20px;width:110px;height:110px;border-radius:50%;background:rgba(201,168,76,.12);}
.pb-c{position:relative;z-index:1;}
.pb-ttl{font-family:"Playfair Display",serif;font-size:22px;color:#fff;margin-bottom:5px;}
.pb-sub{font-size:11px;color:var(--gold);margin-bottom:14px;}
/* WHY */
.why{padding:28px 16px;background:var(--surface2);}
.why-ttl{font-family:"Cormorant Garamond",serif;font-size:20px;text-align:center;margin-bottom:16px;}
.why-g{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.why-c{background:var(--surface);border-radius:12px;padding:14px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.why-ic{font-size:26px;margin-bottom:6px;}.why-nm{font-size:11px;font-weight:700;margin-bottom:3px;}.why-ds{font-size:9px;color:var(--text3);}
/* FOOTER */
.ft{background:#0a0a0a;padding:36px 20px 28px;text-align:center;}
.ft-logo{font-family:"Cormorant Garamond",serif;font-size:32px;color:#fff;letter-spacing:.3em;font-weight:300;margin-bottom:6px;}
.ft-tag{font-size:9px;letter-spacing:.2em;color:var(--gold);margin-bottom:20px;}
.ft-soc{display:flex;gap:10px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;}
.soc-b{padding:7px 14px;border-radius:20px;background:rgba(255,255,255,.08);color:#fff;font-size:10px;font-weight:600;border:1px solid rgba(255,255,255,.15);}
.ft-links{display:flex;gap:14px;justify-content:center;margin-bottom:12px;flex-wrap:wrap;}
.ft-links button{color:var(--text3);font-size:11px;}
.ft-copy{font-size:9px;color:#444;}
/* BUTTONS */
.btn-g{background:var(--gold);color:#000;padding:13px 22px;border-radius:50px;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;display:inline-block;}
.btn-g.fw{display:block;width:100%;text-align:center;}
.btn-g.sm{padding:9px 14px;border-radius:8px;font-size:10px;flex-shrink:0;}
.btn-o{background:transparent;color:var(--text);padding:12px 22px;border-radius:50px;font-size:11px;font-weight:600;border:1px solid var(--border);cursor:pointer;display:inline-block;}
.btn-o.fw{display:block;width:100%;text-align:center;margin-top:8px;}
.btn-og{background:transparent;color:var(--gold);padding:13px 22px;border-radius:50px;font-size:11px;font-weight:700;border:1px solid var(--gold);width:100%;margin-top:8px;cursor:pointer;}
.btn-txt{background:none;color:var(--text3);font-size:11px;margin-top:14px;display:block;text-align:center;width:100%;cursor:pointer;}
.btn-gg{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:12px;border-radius:11px;background:var(--surface2);color:var(--text);font-size:12px;font-weight:600;border:1px solid var(--border);margin-top:9px;cursor:pointer;}
/* PRODUCT DETAIL */
.pd-gal{position:relative;background:#111;}
.pd-main{width:100%;height:68vw;max-height:410px;object-fit:cover;}
.pd-body{padding:18px 16px;background:var(--surface);}
.pd-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px;}
.pd-cat{font-size:9px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:3px;}
.pd-nm{font-family:"Playfair Display",serif;font-size:22px;font-weight:700;line-height:1.2;}
.wb-lg{font-size:22px;padding:4px;flex-shrink:0;background:none;border:none;cursor:pointer;}
.pd-rt{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
.stars{color:var(--gold);font-size:13px;}.rn{font-weight:700;font-size:12px;}.rv{font-size:10px;color:var(--text3);}
.pd-pr{display:flex;align-items:center;gap:9px;margin-bottom:11px;flex-wrap:wrap;}
.pr-lg{font-size:24px;font-weight:900;color:var(--gold);}
.pr-cl{font-size:13px;color:var(--text3);text-decoration:line-through;}
.sv-b{background:#e8f5e9;color:#2e7d32;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
.pd-desc{font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:14px;}
.opt-sec{margin-bottom:12px;}
.opt-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;color:var(--text2);}
.opt-sel{color:var(--gold);font-weight:600;}
.opt-chips{display:flex;flex-wrap:wrap;gap:7px;}
.oc{padding:6px 13px;border-radius:8px;font-size:11px;font-weight:600;background:var(--surface2);color:var(--text);border:1.5px solid var(--border);cursor:pointer;}
.oc.on{background:var(--gold);color:#000;border-color:var(--gold);}
.qty-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.qty-lbl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.qty-c{display:flex;align-items:center;border:1px solid var(--border);border-radius:9px;overflow:hidden;}
.qty-c button{width:34px;height:34px;font-size:17px;background:var(--surface2);color:var(--text);display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;}
.qty-c span{width:42px;text-align:center;font-weight:700;font-size:14px;}
.atc-row{display:flex;flex-direction:column;margin-bottom:14px;}
.pd-meta{background:var(--surface2);border-radius:11px;padding:13px;margin-bottom:14px;}
.mi{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.mi:last-child{margin-bottom:0;}
/* CART */
.ct-list{padding:0 16px;}
.ct-item{display:flex;gap:11px;padding:14px 0;border-bottom:1px solid var(--border);position:relative;}
.ct-img{width:76px;height:76px;border-radius:11px;object-fit:cover;flex-shrink:0;cursor:pointer;}
.ct-info{flex:1;min-width:0;}
.ct-nm{font-size:12px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ct-opt{font-size:9px;color:var(--text3);margin-bottom:5px;}
.ct-pr{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:7px;}
.ct-qc{display:flex;align-items:center;gap:10px;}
.ct-qc button{width:26px;height:26px;border-radius:6px;background:var(--surface2);font-size:15px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;}
.ct-qc span{font-weight:700;font-size:13px;}
.ct-rm{position:absolute;top:14px;right:0;color:var(--text3);font-size:13px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;}
.ct-sum{padding:14px;margin:14px 16px;background:var(--surface);border-radius:var(--r);box-shadow:0 2px 12px rgba(0,0,0,.06);}
.sr{display:flex;justify-content:space-between;font-size:12px;margin-bottom:9px;color:var(--text2);}
.st{display:flex;justify-content:space-between;font-size:15px;font-weight:700;padding:10px 0;border-top:1px solid var(--border);margin-bottom:14px;}
.cb{position:absolute;top:-3px;right:-3px;background:var(--gold);color:#000;width:17px;height:17px;border-radius:50%;font-size:8px;font-weight:900;display:flex;align-items:center;justify-content:center;}
/* CHECKOUT */
.co-wrap{padding:14px;}
.co-sec{background:var(--surface);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.co-ttl{font-size:13px;font-weight:700;letter-spacing:.04em;margin-bottom:10px;}
.inp{width:100%;padding:12px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:11px;font-size:12px;color:var(--text);margin-bottom:9px;}
.inp:focus{border-color:var(--gold);outline:none;}
.inp::placeholder{color:var(--text3);}
.pay-opts{display:flex;flex-direction:column;gap:9px;}
.pay-opt{display:flex;}
.pay-opt input[type=radio]{display:none;}
.pay-card{display:flex;align-items:center;gap:11px;padding:13px;border-radius:11px;border:2px solid var(--border);background:var(--surface2);width:100%;cursor:pointer;}
.pay-opt input:checked+.pay-card{border-color:var(--gold);background:rgba(201,168,76,.07);}
.pay-ic{font-size:22px;}.pay-nm{font-size:12px;font-weight:700;margin-bottom:2px;}
.pay-det{font-size:10px;color:var(--text3);line-height:1.5;}
.prm-row{display:flex;gap:7px;margin-bottom:7px;}
.prm-ok{font-size:10px;color:#2e7d32;font-weight:600;margin-bottom:3px;}
.prm-hint{font-size:9px;color:var(--text3);}
.ol{display:flex;justify-content:space-between;font-size:11px;margin-bottom:7px;color:var(--text2);}
.ol.g{color:#2e7d32;}.ol.b{font-weight:700;color:var(--text);font-size:13px;}
.odiv{height:1px;background:var(--border);margin:7px 0;}
.sec-note{text-align:center;font-size:10px;color:var(--text3);margin-top:10px;}
/* ORDERS */
.ord-list{padding:14px;display:flex;flex-direction:column;gap:10px;}
.ord-card{background:var(--surface);border-radius:var(--r);padding:14px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.oc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.oid{font-weight:700;font-size:13px;}.odt{font-size:10px;color:var(--text3);}
.ost{padding:3px 9px;border-radius:20px;font-size:9px;font-weight:700;}
.ost.pending{background:#fff8e1;color:#f57c00;}.ost.confirmed,.ost.delivered{background:#e8f5e9;color:#2e7d32;}
.ost.processing{background:#e3f2fd;color:#1565c0;}.ost.shipped{background:#f3e5f5;color:#7b1fa2;}.ost.cancelled{background:#ffebee;color:#c62828;}
.oi-prev{display:flex;gap:7px;margin-bottom:7px;align-items:center;}
.oi-prev img{width:38px;height:38px;border-radius:6px;object-fit:cover;}
.o-tot{font-size:12px;font-weight:700;color:var(--gold);}
.o-pay{font-size:10px;color:var(--text3);margin-top:3px;}
/* AUTH */
.auth-pg{min-height:100vh;background:linear-gradient(160deg,#0a0a0a,#1a1200,#0a0a0a);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 20px;}
.auth-logo{font-family:"Cormorant Garamond",serif;font-size:52px;font-weight:300;color:#fff;letter-spacing:.3em;margin-bottom:6px;}
.auth-tag{font-size:9px;letter-spacing:.4em;color:var(--gold);margin-bottom:36px;}

// ── HELPERS ──────────────────────────────────────────────
function N(n){return "\u20a6"+Number(n||0).toLocaleString("en-NG");}
function G(id){return document.getElementById(id);}
function sCart(){localStorage.setItem("B_cart",JSON.stringify(CART));}
function sWish(){localStorage.setItem("B_wish",JSON.stringify(WISH));}
function sRecent(){localStorage.setItem("B_recent",JSON.stringify(RECENT));}
function inWish(id){return WISH.indexOf(id)>-1;}
function cartQty(){return CART.reduce(function(s,i){return s+i.qty;},0);}
function cartTot(){return CART.reduce(function(s,i){return s+i.price*i.qty;},0);}
function stars(r){var s="";for(var i=1;i<=5;i++)s+=i<=Math.floor(r||0)?"★":"☆";return s;}
function fDate(ts){try{var d=ts&&ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString("en-NG",{day:"numeric",month:"short",year:"numeric"});}catch(e){return "";}}

function toast(msg,type){
  var t=G("toast");
  t.textContent=msg;
  t.className="toast on"+(type==="err"?" err":"");
  clearTimeout(t._t);
  t._t=setTimeout(function(){t.className="toast";},3200);
}

function updBadge(){
  var n=cartQty(),cb=G("cb-nav");
  if(cb){cb.textContent=n;cb.style.display=n>0?"flex":"none";}
}

function updWish(){
  document.querySelectorAll(".wb").forEach(function(b){
    b.innerHTML=inWish(b.getAttribute("data-pid"))?"❤️":"🤍";
  });
}

function updSidebar(){
  var su=G("sb-user");
  if(su)su.textContent=CU?(CU.displayName||CU.email):"Guest";
  var sa=G("sb-admin"),sl=G("sb-login"),slo=G("sb-logout");
  if(sa)sa.style.display=ADMIN?"flex":"none";
  if(sl)sl.style.display=CU?"none":"flex";
  if(slo)slo.style.display=CU?"flex":"none";
}

function openSB(){
  var sb=G("sidebar"),ov=G("sb-overlay");
  if(sb)sb.classList.add("open");
  if(ov)ov.classList.add("on");
}
function closeSB(){
  var sb=G("sidebar"),ov=G("sb-overlay");
  if(sb)sb.classList.remove("open");
  if(ov)ov.classList.remove("on");
}

function addRecent(p){
  RECENT=RECENT.filter(function(x){return x.id!==p.id;});
  RECENT.unshift(p);if(RECENT.length>8)RECENT.pop();sRecent();
}

function addCart(p,sz,cl,qty){
  var ex=null;
  for(var i=0;i<CART.length;i++){if(CART[i].id===p.id&&CART[i].sz===sz&&CART[i].cl===cl){ex=CART[i];break;}}
  if(ex)ex.qty+=qty||1;
  else CART.push({id:p.id,name:p.name,price:p.price,img:p.img,sz:sz,cl:cl,qty:qty||1});
  sCart();updBadge();toast("Added to cart!");
}

function wishToggle(pid){
  var i=WISH.indexOf(pid);
  if(i>-1)WISH.splice(i,1);else WISH.push(pid);
  sWish();updWish();
  toast(i>-1?"Removed from wishlist":"Added to wishlist!");
}

function applyTheme(){document.documentElement.setAttribute("data-theme",DARK?"dark":"light");}
function toggleDark(){DARK=!DARK;localStorage.setItem("B_dark",DARK);applyTheme();}

    desc:    x.description   || x.desc || "",
    sizes:   x.sizes         || ["One Size"],

// Get products with filter - if no products match filter, return ALL products for home sections
function getP(f){
  var l=PRODUCTS.slice();
  if(f.cat)l=l.filter(function(p){return p.cat===f.cat;});
  if(f.flash)l=l.filter(function(p){return p.isFlash;});
  if(f.q){var q=f.q.toLowerCase();l=l.filter(function(p){return(p.name+" "+p.cat).toLowerCase().indexOf(q)>-1;});}
  // For feat/bs/na - if none match, just return all products so page is never empty
  if(f.feat){
    var featured=l.filter(function(p){return p.feat;});
    return featured.length>0?featured:l;
  }
  if(f.bs){
    var bs=l.filter(function(p){return p.bs;});
    return bs.length>0?bs:l;
  }
  if(f.na){
    var na=l.filter(function(p){return p.na;});
    return na.length>0?na:l;
  }
  return l;
}

// ── NAVIGATE ─────────────────────────────────────────────
function go(page,data,skipHistory){
  if(data!==undefined){if(page==="product")CUR_P=data;if(page==="category")CUR_CAT=data;}
  // Push to browser history so back button works within app
  if(!skipHistory){
    var state={page:page};
    if(page==="product"&&CUR_P)state.productId=CUR_P.id;
    if(page==="category"&&CUR_CAT)state.catId=CUR_CAT.id;
    history.pushState(state,"",location.pathname+"#"+page);
  }
  document.querySelectorAll(".pg").forEach(function(p){p.classList.remove("on");});
  var t=G("pg-"+page);if(t){t.classList.add("on");setTimeout(function(){t.scrollTop=0;},10);}
  var m={home:"ni-home",categories:"ni-categories",cart:"ni-cart",wishlist:"ni-wishlist",profile:"ni-profile"};
  document.querySelectorAll(".ni").forEach(function(n){n.classList.remove("on");});
  if(m[page]){var ne=G(m[page]);if(ne)ne.classList.add("on");}
  if(page==="home")rHome();
  else if(page==="categories")rCats();
  else if(page==="category")rCat();
  else if(page==="product")rProduct();
  else if(page==="cart")rCart();
  else if(page==="checkout")rCheckout();
  else if(page==="wishlist")rWish();
  else if(page==="orders")rOrders();
  else if(page==="search")rSearch();
  else if(page==="login")rLogin();
  else if(page==="profile")rProfile();
  else if(page==="about")rAbout();
  else if(page==="contact")rContact();
  else if(page==="admin")rAdmin();
}

// Handle browser back/forward button
window.addEventListener("popstate",function(e){
  var state=e.state;
  if(!state){
    // No state = went back to very start, just show home
    go("home",undefined,true);
    return;
  }
  var page=state.page||"home";
  // Restore product/category if needed
  if(page==="product"&&state.productId){
    var p=null;for(var i=0;i<PRODUCTS.length;i++){if(PRODUCTS[i].id===state.productId){p=PRODUCTS[i];break;}}
    if(p)CUR_P=p;
  }
  if(page==="category"&&state.catId){
    var c=null;for(var i=0;i<CATS.length;i++){if(CATS[i].id===state.catId){c=CATS[i];break;}}
    if(c)CUR_CAT=c;
  }
  go(page,undefined,true);
});

function rSearch(){
  var el=G("pg-search");if(!el)return;
  // Get unique categories from actual products
  var cats={};PRODUCTS.forEach(function(p){if(p.cat)cats[p.cat]=true;});
  var catBtns=Object.keys(cats).slice(0,6).map(function(c){return '<button class="s-chip" onclick="fillS(\''+c+'\')">'+c+'</button>';}).join("");
  el.innerHTML='<div><div class="ph"><button class="bb" onclick="go(\'home\')"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button><div class="si-wrap"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><input id="s-in" class="si" placeholder="Search '+PRODUCTS.length+' products..." value="'+SEARCH+'" oninput="doSearch(this.value)"/><button onclick="G(\'s-in\').value=\'\';doSearch(\'\')">&#10005;</button></div></div>'
    +'<div id="s-res"><div class="ss"><div class="ss-ttl">Browse by Category</div><div class="ss-chips">'+catBtns+'</div></div></div></div>';
  if(SEARCH)doSearch(SEARCH);
  setTimeout(function(){var s=G("s-in");if(s)s.focus();},120);
}
function fillS(q){var s=G("s-in");if(s)s.value=q;doSearch(q);}
function doSearch(q){
  SEARCH=q;var res=G("s-res");if(!res)return;
  if(!q.trim()){
    var cats={};PRODUCTS.forEach(function(p){if(p.cat)cats[p.cat]=true;});
    var catBtns=Object.keys(cats).slice(0,6).map(function(c){return '<button class="s-chip" onclick="fillS(\''+c+'\')">'+c+'</button>';}).join("");
    res.innerHTML='<div class="ss"><div class="ss-ttl">Browse by Category</div><div class="ss-chips">'+catBtns+'</div></div>';return;
  }
  var ql=q.toLowerCase();
  var found=PRODUCTS.filter(function(p){return(p.name+" "+p.cat+" "+(p.desc||"")).toLowerCase().indexOf(ql)>-1;});
  var h="";found.forEach(function(p){h+=PC(p);});
  res.innerHTML=found.length?'<div class="s-cnt">'+found.length+' result'+(found.length>1?'s':'')+' for "'+q+'"</div><div class="pg2" style="padding:0 16px 16px">'+h+'</div>':'<div class="emp"><div class="emp-ic">🔍</div><div class="emp-ttl">No results for "'+q+'"</div><div class="emp-sub">Try searching by category name</div></div>';
  updWish();
}

    +'<input class="inp" id="np-sz" placeholder="Sizes (comma separated e.g. S,M,L,XL)"/>'

    +'<label><input type="checkbox" id="np-bs"/> Best Seller</label>'

function showAddProd(){var f=G("apf");if(f)f.style.display=f.style.display==="none"?"block":"none";}
function saveNewProd(){
  var nm=(G("np-nm")||{}).value||"";
  var pr=parseFloat((G("np-pr")||{}).value)||0;
  var img=(G("np-img")||{}).value||"";
  if(!nm.trim()||!pr||!img.trim()){toast("Name, Price and Image are required","err");return;}
  var clRaw=(G("np-cl")||{}).value||"Black";
  var szRaw=(G("np-sz")||{}).value||"One Size";
  var data={
    name:nm.trim(), price:pr,
    discountPrice:parseFloat((G("np-dp")||{}).value)||0,
    category:(G("np-ct")||{}).value||"Men's Fashion",
    images:[img.trim()],
    colours:clRaw.split(",").map(function(s){return s.trim();}),
    sizes:szRaw.split(",").map(function(s){return s.trim();}),
    stock:parseInt((G("np-stk")||{}).value)||99,
    badge:(G("np-bdg")||{}).value||"",
    description:(G("np-dsc")||{}).value||"",
    featured:!!(G("np-ft")||{}).checked,
    bestSeller:!!(G("np-bs")||{}).checked,
    newArrival:!!(G("np-na")||{}).checked,
    isFlash:!!(G("np-fl")||{}).checked,
    rating:0, reviews:0,
    createdAt:new Date()
  };
  if(!DB){toast("Firebase not connected","err");return;}
  DB.collection("products").add(data).then(function(ref){
    toast("Product added successfully!");
    PRODUCTS.push(mapProduct(ref.id,data));
    adPr();
  }).catch(function(e){toast("Error: "+e.message,"err");});
}
function delProd(id){
  if(!confirm("Delete this product? This cannot be undone."))return;
  if(!DB){toast("Firebase not connected","err");return;}
  DB.collection("products").doc(id).delete().then(function(){
    PRODUCTS=PRODUCTS.filter(function(p){return p.id!==id;});
    toast("Product deleted");adPr();
  }).catch(function(e){toast("Error: "+e.message,"err");});
}
function adUs(){
  var c=G("ad-c");if(!c)return;
  c.innerHTML='<div class="lds">Loading users...</div>';
  if(!DB){c.innerHTML='<div class="ers">Firebase not connected</div>';return;}
  DB.collection("users").get().then(function(snap){
    var h='<div style="padding:0 16px 16px">'
      +'<div style="font-size:13px;font-weight:700;margin-bottom:10px">Total: '+snap.size+' customers</div>';
    snap.docs.forEach(function(d){
      var u=Object.assign({id:d.id},d.data());
      h+='<div class="adm-ur"><div class="adm-uav">'+((u.name||u.email||"?")[0].toUpperCase())+'</div><div class="adm-ui"><div class="adm-unm">'+(u.name||"—")+'</div><div class="adm-uem">'+(u.email||"")+'</div></div><span class="rb '+(u.role||"user")+'">'+(u.role||"user")+'</span></div>';
    });
    c.innerHTML=h+'</div>';
  }).catch(function(){c.innerHTML='<div class="ers">Error loading users</div>';});
}

// ── PLACE ORDER ───────────────────────────────────────────
function placeOrder(){
  var nm=(G("co-nm")||{}).value||"",ph=(G("co-ph")||{}).value||"",
      em=(G("co-em")||{}).value||"",ad=(G("co-ad")||{}).value||"",st=(G("co-st")||{}).value||"";
  var pay=document.querySelector("input[name=pay]:checked");
  if(!nm.trim()||!ph.trim()||!ad.trim()||!st.trim()){toast("Please fill all required fields","err");return;}
  if(!DB){toast("Firebase not connected","err");return;}
  var btn=G("place-btn");if(btn){btn.textContent="Placing...";btn.disabled=true;}
  var ship=cartTot()>=50000?0:2500,tot=cartTot()-PROMO_D+ship;
  DB.collection("orders").add({
    name:nm,phone:ph,email:em,address:ad,state:st,
    paymentMethod:pay?pay.value:"transfer",
    status:"pending",total:tot,promoCode:PROMO,promoDiscount:PROMO_D,
    userId:CU?CU.uid:"guest",
    items:CART.map(function(i){return{id:i.id,name:i.name,price:i.price,qty:i.qty,sz:i.sz,cl:i.cl,img:i.img};}),
    createdAt:new Date()
  }).then(function(ref){
    CART=[];PROMO="";PROMO_D=0;sCart();updBadge();
    toast("Order placed! #"+ref.id.slice(0,8).toUpperCase());go("orders");
  }).catch(function(e){toast("Error: "+e.message,"err");if(btn){btn.textContent="Place Order";btn.disabled=false;}});
}

// ── SPLASH DISMISS ────────────────────────────────────────
var _gone=false;
function dismissSplash(){
  if(_gone)return;_gone=true;
  var s=G("pg-splash");if(s)s.style.cssText="display:none!important";
  // Replace splash state with home (so back doesn't return to splash)
  history.replaceState({page:"home"},"",location.pathname+"#home");
  var h=G("pg-home");if(h)h.classList.add("on");
  document.querySelectorAll(".ni").forEach(function(n){n.classList.remove("on");});
  var nh=G("ni-home");if(nh)nh.classList.add("on");
  try{rHome();}catch(e){console.warn("rHome:",e);}
}
setTimeout(dismissSplash,2000);
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",function(){setTimeout(dismissSplash,50);});}
else{setTimeout(dismissSplash,50);}
window.addEventListener("load",function(){setTimeout(dismissSplash,100);});
</script>
